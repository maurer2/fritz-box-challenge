packages:
  - 'experiments/*'

allowBuilds:
  msw: true
  unrs-resolver: true
  esbuild: true

minimumReleaseAge: 10080 # 7 days
blockExoticSubdeps: true # no git branch as package url

minimumReleaseAgeExclude:
  - 'rolldown'
  - '@oxc-project/types'
resolutionMode: highest

supportedArchitectures:
  cpu:
    - arm64
    - x64
  os:
    - darwin
    - linux
    - win32
